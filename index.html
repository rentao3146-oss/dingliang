<body>
  <header class="topbar">
    <div class="brand"><div class="brand-mark"><i data-lucide="flask-conical"></i></div><div class="title-wrap"><h1>定量版块数据看板</h1><div class="subtitle">数智工厂 · 品质管理 / 定量检测全流程洞察</div></div></div>
    <div class="top-actions">
      <button class="btn" id="annotationBtn" aria-pressed="false" onclick="toggleAnnotation()"><i data-lucide="badge-info"></i><span>标注</span></button>
      <span class="card-note" id="updatedAt">更新于 09:30</span>
      <button class="btn icon" aria-label="刷新数据" title="刷新数据" onclick="refreshData()"><i data-lucide="refresh-cw"></i></button>
      <button class="btn icon" aria-label="切换主题" title="切换主题" onclick="toggleTheme()"><i data-lucide="moon"></i></button>
      <button class="btn" id="editLayoutBtn" onclick="enterLayoutEdit()"><i data-lucide="layout-dashboard"></i><span>编辑看板</span></button>
      <div class="edit-actions"><button class="btn" onclick="cancelLayout()">取消</button><button class="btn" onclick="restoreLayout()">恢复默认</button><button class="btn primary" onclick="saveLayout()">保存布局</button></div>
      <button class="btn primary" onclick="exportCurrent()"><i data-lucide="download"></i><span>导出当前数据</span></button>
    </div>

    const annotationLogic={
      'global-filters':{tag:'A1',title:'全局筛选区',desc:'控制全页业务日期范围和趋势图时间粒度。',sources:['产品定量检验报告 > 报告日期','定量测定原始记录 > 检测日期','页面固定配置 > 周期类型'],rules:['产品定量检验报告按报告日期限定开始、结束日期。','定量测定原始记录按检测日期限定开始、结束日期。','周期类型包含按日、按周、按月，只改变两张趋势图的分组粒度，不改变 KPI 总数。','只统计单据状态=已完成；日期区间包含开始日和结束日。'],interaction:'修改日期或周期后立即刷新 KPI 和图表；重置恢复默认日期与按日周期。'},
      'kpi-total':{tag:'B1-1',title:'KPI / 检测总数',desc:'统计筛选范围内完成检测的批次数量。',sources:['产品定量检验报告 > 批次、批号、单据状态、报告日期、单据编号'],rules:['取单据状态=已完成，报告日期在顶部筛选范围内。','按批次+批号组合去重计数，同一组合只计 1 项。','单据编号不参与数量去重，只用于追溯原始报告。'],interaction:'点击打开“全部”检测结果遮罩弹框，并继承开始日期和结束日期。'},
      'kpi-passed':{tag:'B1-2',title:'KPI / 检测合格数',desc:'统计检验结果为合格的去重批次数量。',sources:['产品定量检验报告 > 批次、批号、单据状态、报告日期、检验结果'],rules:['取单据状态=已完成，报告日期在顶部筛选范围内。','筛选检验结果=合格后，按批次+批号组合去重计数。'],interaction:'点击打开“合格”检测结果遮罩弹框，并继承顶部日期。'},
      'kpi-pass-rate':{tag:'B1-3',title:'KPI / 检测合格率',desc:'反映有效检测批次的合格比例。',sources:['产品定量检验报告 > 批次、批号、单据状态、报告日期、检验结果'],rules:['分子=检验结果为合格的去重批次+批号数。','分母=检验结果为合格或不合格的去重批次+批号数。','合格率=分子÷分母×100%，保留 2 位小数；分母为 0 时显示 --。'],interaction:'无。'},

      'project-detection-results':{tag:'B3',title:'各项目检测结果',desc:'按项目、时间和线别查看样品平均测定结果。',sources:['定量测定原始记录 > 单据状态、检测日期、检验项目、样品批次、样品批号、平均值、单位、线别'],rules:['取单据状态=已完成且检测日期在顶部筛选范围内的记录。','按样品批次+样品批号+检验项目去重，每个样品取明细平均值；空值和非数值不参与计算。','按周期和线别分组，对有效样品平均值求平均；顶部摘要显示当前范围的平均值、最大值、最小值。','同一项目单位不一致时不合并统计。'],interaction:'右上角可选择全部线别或单一线别，并切换检验项目；全部线别同时展示 6 条曲线。'},

    function selectAnnotation(id,scroll=true){if(!annotationLogic[id])return;state.annotationSelected=id;document.querySelectorAll('.annotation-target').forEach(el=>el.classList.toggle('annotation-selected',el.dataset.annotationId===id));document.querySelectorAll('#annotationDirectory button').forEach(btn=>btn.classList.toggle('active',btn.dataset.ruleId===id));renderAnnotationRule(id);const target=document.querySelector(`.annotation-target[data-annotation-id="${id}"]`);if(scroll&&target&&target.offsetParent!==null)target.scrollIntoView({behavior:'smooth',block:'center'})}

    function simulateBatchReminder(){const r=reminders[state.reminderIndex%reminders.length];state.reminderIndex++;state.currentReminder=r;$('sampleReminderTitle').textContent=`${r.batch} / ${r.lot} 需要取定量样品`;$('sampleReminderDesc').textContent=`批号尾数 ${r.lot.slice(0,3).slice(-2)} 命中 02/04/06 抽样规则，请确认是否已执行取样。`;$('sampleModal').classList.add('open');lucide.createIcons()}
    function closeSampleModal(){$('sampleModal').classList.remove('open')}
    function confirmSampling(sampled){const r=state.currentReminder;if(!r)return closeSampleModal();const existing=records.find(x=>x.batch===r.batch&&x.lot===r.lot);if(existing){existing.sampled=sampled;existing.risk=sampled?'':'抽样待确认'}else records.push({batch:r.batch,lot:r.lot,product:'红牛维生素功能饮料',type:'成品',project:'定量检测',item:'待分配',inspector:'待分配',date:'2026-06-22',value:'--',spec:'待配置',rsd:null,result:'待完成',doc:'定量批号确认单',need:true,sampled,risk:sampled?'检测待完成':'抽样待确认'});state.currentReminder=null;closeSampleModal();applyFilters();toast(sampled?'已确认取样并纳入抽样统计':'已记录待取样风险')}
    function renderRisks(rows){const defs=[{name:'规格超限',desc:'最终结果超出项目规格范围',level:'danger',count:()=>rows.filter(r=>r.risk==='规格超限').length,action:`setDrill('risk','规格超限','风险：规格超限')`},{name:'平行样偏差',desc:'RSD超过项目配置阈值',level:'danger',count:()=>rows.filter(r=>r.risk==='平行样偏差').length,action:`setDrill('risk','平行样偏差','风险：平行样偏差')`},{name:'临界值',desc:'检测值进入规格临界区间',level:'warning',count:()=>rows.filter(r=>r.risk==='临界值').length,action:`setDrill('risk','临界值','风险：临界值')`},{name:'抽样待确认',desc:'需取样批次尚未确认执行状态',level:'warning',count:()=>rows.filter(r=>r.risk==='抽样待确认').length,action:`setDrill('risk','抽样待确认','风险：抽样待确认')`},{name:'检测待完成',desc:'检测记录尚无最终有效结果',level:'info',count:()=>rows.filter(r=>r.risk==='检测待完成').length,action:`setDrill('risk','检测待完成','风险：检测待完成')`},{name:'仪器/标准物质临期',desc:'检定、校准或标准物质有效期临近',level:'warning',count:()=>equipmentReminders.filter(r=>r.status!=='已确认').length,action:`scrollModule('equipment-reminder')`},{name:'供应商资质临期',desc:'供应商资质证书临近过期',level:'warning',count:()=>supplierReminders.filter(r=>r.status!=='已确认').length,action:`scrollModule('supplier-reminder')`}],items=defs.map(d=>({...d,count:d.count()}));$('riskTotal').textContent=`${items.reduce((s,r)=>s+r.count,0)}项风险`;$('riskGrid').innerHTML=items.map(r=>`<button class="risk-item ${r.level}" onclick="${r.action}"><span class="risk-bar"></span><span><span class="risk-title">${r.name}</span><span class="risk-desc">${r.desc}</span></span><span class="count-badge">${r.count}</span></button>`).join('')}
    function statusTag(r){const c=r==='合格'?'success':r==='不合格'?'danger':r==='临界'?'warning':'';return `<span class="tag ${c}">${r}</span>`}
    function renderTable(rows){$('tableCount').textContent=`${rows.length}条`;$('detailRows').innerHTML=rows.length?rows.map((r,i)=>`<tr><td><button class="link-btn" onclick="openDrawer(${records.indexOf(r)})">${r.batch} / ${r.lot}</button></td><td>${r.product}</td><td>${r.type}</td><td>${r.project} · ${r.item}</td><td>${r.inspector}</td><td>${r.date}</td><td>${r.value}</td><td>${r.spec}</td><td>${r.rsd==null?'--':r.rsd+'%'}</td><td>${statusTag(r.result)}</td><td>${r.doc}</td><td><button class="link-btn" onclick="openDrawer(${records.indexOf(r)})">查看详情</button></td></tr>`).join(''):`<tr><td colspan="12"><div class="empty">当前条件下暂无数据</div></td></tr>`}
    function openDrawer(i){const r=records[i];$('drawerSubtitle').textContent=`${r.batch} / ${r.lot}`;$('drawerBody').innerHTML=`<div class="detail-hero"><div class="detail-id">${r.product}</div><div class="detail-tags">${statusTag(r.result)}<span class="tag">${r.type}</span><span class="tag accent">${r.item}</span>${r.risk?`<span class="tag danger">${r.risk}</span>`:''}</div></div><div class="detail-grid"><div class="detail-metric"><span>检测值</span><strong>${r.value}</strong></div><div class="detail-metric"><span>规格范围</span><strong>${r.spec}</strong></div><div class="detail-metric"><span>平行样RSD</span><strong>${r.rsd==null?'--':r.rsd+'%'}</strong></div><div class="detail-metric"><span>检测人员</span><strong>${r.inspector}</strong></div><div class="detail-metric"><span>检测日期</span><strong>${r.date}</strong></div><div class="detail-metric"><span>取样状态</span><strong>${r.need?(r.sampled?'已确认':'待确认'):'不适用'}</strong></div></div><h3 class="section-title">检测轨迹</h3><div class="timeline"><div class="timeline-item"><strong>批次生成</strong><small>${r.date} 08:20 · 定量批号确认单</small></div><div class="timeline-item"><strong>${r.sampled?'取样已确认':'取样状态待确认'}</strong><small>${r.need?'抽样执行模拟字段':'该样品不适用抽样规则'}</small></div><div class="timeline-item"><strong>检测结果记录</strong><small>${r.date} 14:35 · ${r.inspector}</small></div><div class="timeline-item"><strong>${r.result==='待完成'?'等待最终判定':'最终结果：'+r.result}</strong><small>${r.doc}</small></div></div><h3 class="section-title">关联记录</h3><div class="detail-metric"><span>来源单据</span><strong>${r.doc}</strong><span style="margin-top:5px">业务关联键：${r.batch}+${r.lot}+${r.item}</span></div>`;$('drawerMask').classList.add('open');$('drawer').classList.add('open');$('drawer').setAttribute('aria-hidden','false');lucide.createIcons()}
    function closeDrawer(){$('drawerMask').classList.remove('open');$('drawer').classList.remove('open');$('drawer').setAttribute('aria-hidden','true')}
    function setGranularity(btn,g){state.granularity=g;$('cycleType').value=g;btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b===btn));renderTrend(baseFiltered());updateSummary()}
    function toggleTheme(){const next=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=next;localStorage.setItem('qty-theme',next);setTimeout(()=>{Object.values(charts).forEach(c=>c.dispose());charts={};renderCharts(baseFiltered())},30)}
    function refreshData(){$('updatedAt').textContent=`更新于 ${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}`;applyFilters();toast('数据已刷新')}
    function exportCurrent(){const rows=filtered(),headers=['批次','批号','产品名称','样品类型','检测项目','检测人员','检测日期','检测值','规格范围','RSD','最终结论','关联单据'],csv=[headers,...rows.map(r=>[r.batch,r.lot,r.product,r.type,`${r.project}-${r.item}`,r.inspector,r.date,r.value,r.spec,r.rsd??'',r.result,r.doc])].map(a=>a.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));a.download='定量检测明细.csv';a.click();URL.revokeObjectURL(a.href);toast(`已导出 ${rows.length} 条明细`)}
    function toast(text){const el=$('toast');el.textContent=text;el.classList.add('show');clearTimeout(el.t);el.t=setTimeout(()=>el.classList.remove('show'),1800)}
    function enterLayoutEdit(){if(state.annotation)setAnnotation(false);state.editing=true;state.layoutSnapshot={kpi:[...$('kpiGrid').children].map(e=>e.dataset.moduleId),modules:[...$('moduleGrid').children].map(e=>e.dataset.moduleId)};document.body.classList.add('layout-editing');makeDraggable($('kpiGrid'));makeDraggable($('moduleGrid'));toast('已进入卡片布局编辑')}
    function makeDraggable(container){[...container.children].filter(e=>e.classList.contains('dashboard-module')).forEach(el=>{el.draggable=state.editing;el.ondragstart=()=>el.classList.add('dragging');el.ondragend=()=>el.classList.remove('dragging');el.ondragover=e=>{if(!state.editing)return;e.preventDefault();el.classList.add('drop-target')};el.ondragleave=()=>el.classList.remove('drop-target');el.ondrop=e=>{e.preventDefault();el.classList.remove('drop-target');const moving=container.querySelector('.dragging');if(moving&&moving!==el)container.insertBefore(moving,el)}})}
    function order(container){return [...container.children].map(e=>e.dataset.moduleId)}function applyOrder(container,ids){ids?.forEach(id=>{const el=[...container.children].find(e=>e.dataset.moduleId===id);if(el)container.appendChild(el)})}
    function saveLayout(){localStorage.setItem('qty-layout',JSON.stringify({kpi:order($('kpiGrid')),modules:order($('moduleGrid'))}));exitEdit();toast('布局已保存')}
    function cancelLayout(){applyOrder($('kpiGrid'),state.layoutSnapshot?.kpi);applyOrder($('moduleGrid'),state.layoutSnapshot?.modules);exitEdit();toast('已取消布局修改')}
    function restoreLayout(){localStorage.removeItem('qty-layout');location.reload()}
    function exitEdit(){state.editing=false;document.body.classList.remove('layout-editing');document.querySelectorAll('[draggable]').forEach(e=>e.draggable=false)}
    function applySavedLayout(){document.documentElement.dataset.theme=localStorage.getItem('qty-theme')||'light';const saved=JSON.parse(localStorage.getItem('qty-layout')||'null');if(saved){applyOrder($('moduleGrid'),saved.modules);setTimeout(()=>applyOrder($('kpiGrid'),saved.kpi),0)}}
    init();
  </script>
</body>
</html>
